.io/#app","name":"XRNotify","description":"Real-time webhook notification platform for the XRP Ledger.","url":"https://www.xrnotify.io","applicationCategory":"DeveloperApplication","operatingSystem":"Web","offers":[{"@type":"Offer","name":"Free","price":"0","priceCurrency":"USD","description":"1,000 events/month, 2 webhooks"},{"@type":"Offer","name":"Starter","price":"29.00","priceCurrency":"USD","description":"50,000 events/month, 10 webhooks, WebSocket access"},{"@type":"Offer","name":"Pro","price":"99.00","priceCurrency":"USD","description":"500,000 events/month, 50 webhooks, priority delivery"}],"creator":{"@id":"https://www.jonomor.com/ali-morgan#person"},"publisher":{"@id":"https://www.jonomor.com/#organization"},"isPartOf":{"@id":"https://www.jonomor.com/#organization"},"featureList":["Real-time XRPL event ingestion","HMAC-SHA256 signed webhook delivery","Automatic retries with exponential backoff","Dead-letter queue for failed deliveries","Event replay and reprocessing","23+ XRPL event types supported","Developer dashboard with delivery logs","Per-webhook filtering by event type and account"]}</script><script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://www.xrnotify.io/#faqpage","name":"XRNotify FAQ — Common Questions About XRPL Webhooks","mainEntity":[{"@type":"Question","name":"What is XRNotify?","acceptedAnswer":{"@type":"Answer","text":"XRNotify is a real-time webhook notification platform for the XRP Ledger. It monitors XRPL transactions as they confirm on-chain, normalizes them into clean JSON schemas, and delivers them to your endpoints via HMAC-signed HTTPS POST requests. XRNotify eliminates the need to run your own XRPL node or build polling infrastructure."}},{"@type":"Question","name":"What XRPL events does XRNotify support?","acceptedAnswer":{"@type":"Answer","text":"XRNotify supports 23+ event types across all major XRPL transaction categories: payments (XRP and issued tokens), NFT operations (minting, burning, offers, transfers), DEX trades (OfferCreate, OfferCancel, AMM operations), trustline changes (TrustSet), escrow events (create, finish, cancel), check operations, and account-level changes like settings modifications and deletions."}},{"@type":"Question","name":"How does webhook delivery work?","acceptedAnswer":{"@type":"Answer","text":"When an XRPL transaction matches your configured filters, XRNotify normalizes the event, signs the payload with your webhook secret using HMAC-SHA256, and delivers it as an HTTPS POST to your endpoint. If delivery fails, XRNotify retries with exponential backoff (up to 10 attempts over 12 hours). Events that exhaust all retries are moved to a dead-letter queue for manual inspection and replay."}},{"@type":"Question","name":"Is XRNotify free?","acceptedAnswer":{"@type":"Answer","text":"XRNotify offers a free tier with 1,000 events per month and 2 webhook endpoints — enough for testing and hobby projects. Paid plans start at $29/month (Starter: 50,000 events, 10 webhooks, WebSocket streaming) and $99/month (Pro: 500,000 events, 50 webhooks, priority delivery). Enterprise plans with custom SLAs are available on request."}},{"@type":"Question","name":"How do I verify webhook signatures?","acceptedAnswer":{"@type":"Answer","text":"Every XRNotify webhook includes an X-XRNotify-Signature header containing an HMAC-SHA256 hash of the request body, computed using your webhook signing secret. To verify, compute the HMAC-SHA256 of the raw request body with your secret and compare it to the header value using a constant-time comparison function to prevent timing attacks."}},{"@type":"Question","name":"Who built XRNotify?","acceptedAnswer":{"@type":"Answer","text":"XRNotify was built by Ali Morgan, founder of Jonomor, a systems architecture studio focused on AI Visibility and real-time infrastructure intelligence. XRNotify is the XRPL instrumentation layer of the Jonomor ecosystem, which also includes Guard-Clause, MyPropOps, The Neutral Bridge, Evenfield, and H.U.N.I.E."}},{"@type":"Question","name":"Is XRNotify part of a larger ecosystem?","acceptedAnswer":{"@type":"Answer","text":"Yes. XRNotify is part of the Jonomor ecosystem, a suite of interconnected software products built by Ali Morgan. Within the ecosystem, XRNotify serves as the real-time observation layer — detecting XRPL events at the point of origin before they flow through interpretation and operational layers in other Jonomor properties."}}]}</script><script src="/_next/static/chunks/polyfills-42372ed130431b0a.js" noModule=""></script></head><body class="min-h-screen bg-[#0a0a0f] font-sans text-white antialiased"><a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-50 focus:rounded-lg focus:bg-brand-600 focus:px-4 focus:py-2 focus:text-white focus:outline-none">Skip to main content</a><div id="main-content" class="flex min-h-screen flex-col"><div class="min-h-screen bg-[#0a0a0f] flex flex-col justify-center py-12 sm:px-6 lg:px-8"><div class="sm:mx-auto sm:w-full sm:max-w-md"><div class="flex justify-center"><a class="flex items-center gap-3 no-underline" href="/"><img alt="XRNotify" loading="lazy" width="40" height="40" decoding="async" data-nimg="1" style="color:transparent" src="/logo.svg"/><span class="text-2xl font-bold text-white">XRNotify</span></a></div><h2 class="mt-6 text-center text-3xl font-bold text-white">Reset your password</h2><p class="mt-2 text-center text-sm text-zinc-400">Enter your email and we&#x27;ll send you a reset link</p></div><div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md px-4"><div class="bg-zinc-900/60 border border-zinc-800 rounded-2xl py-8 px-6 sm:px-10"><form class="space-y-5"><div><label for="email" class="block text-sm font-medium text-zinc-300 mb-1.5">Email address</label><input id="email" type="email" autoComplete="email" required="" class="appearance-none block w-full px-3 py-2 rounded-lg border border-zinc-700 bg-zinc-900 text-white place
