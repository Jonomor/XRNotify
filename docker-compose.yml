version: "3.9"

# ============================================
# XRNotify Production Docker Compose
# Complete microservices stack
# ============================================

services:
  # -------- API Service --------
  api:
    build:
      context: .
      target: production
    container_name: xrnotify-api
    restart: always
    environment:
      - NODE_ENV=production
      - SERVICE_ROLE=api
      - PORT=8080
      - DATABASE_URL=postgresql://xrnotify:${DB_PASSWORD:-securepass}@db:5432/xrnotify
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - METRICS_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - xrnet
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # -------- XRPL Listener Service --------
  listener:
    build:
      context: .
      target: production
    container_name: xrnotify-listener
    command: ["node", "dist/listener/index.js"]
    restart: always
    environment:
      - NODE_ENV=production
      - SERVICE_ROLE=listener
      - REDIS_URL=redis://redis:6379
      - XRPL_WS=${XRPL_WS:-wss://xrplcluster.com}
      - XRPL_WS_FALLBACK=${XRPL_WS_FALLBACK:-wss://s1.ripple.com}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - STREAM_NAME=xrpl_events
      - STREAM_MAX_LENGTH=1000000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - xrnet
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # -------- Worker Service --------
  worker:
    build:
      context: .
      target: production
    container_name: xrnotify-worker
    command: ["node", "dist/worker/index.js"]
    restart: always
    environment:
      - NODE_ENV=production
      - SERVICE_ROLE=worker
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://xrnotify:${DB_PASSWORD:-securepass}@db:5432/xrnotify
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - STREAM_NAME=xrpl_events
      - CONSUMER_GROUP=workers
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-10}
      - WEBHOOK_TIMEOUT_MS=${WEBHOOK_TIMEOUT_MS:-3000}
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-3}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xrnet
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # -------- PostgreSQL Database --------
  db:
    image: postgres:16-alpine
    container_name: xrnotify-db
    restart: always
    environment:
      POSTGRES_USER: xrnotify
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepass}
      POSTGRES_DB: xrnotify
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - xrnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xrnotify -d xrnotify"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # -------- Redis Cache/Queue --------
  redis:
    image: redis:7-alpine
    container_name: xrnotify-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - xrnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # -------- Prometheus Metrics --------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: xrnotify-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - xrnet
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # -------- Grafana Dashboard --------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: xrnotify-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - xrnet
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

# -------- Volumes --------
volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# -------- Networks --------
networks:
  xrnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
