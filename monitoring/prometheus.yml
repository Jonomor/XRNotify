# ============================================
# XRNotify Prometheus Configuration
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'xrnotify-prod'
    env: 'production'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files
# rule_files:
#   - /etc/prometheus/rules/*.yml

scrape_configs:
  # ============================================
  # XRNotify API Service
  # ============================================
  - job_name: 'xrnotify-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'xrnotify-api'

  # ============================================
  # XRNotify Listener Service
  # ============================================
  - job_name: 'xrnotify-listener'
    static_configs:
      - targets: ['listener:8080']
    metrics_path: /metrics
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'xrnotify-listener'

  # ============================================
  # XRNotify Worker Service
  # ============================================
  - job_name: 'xrnotify-worker'
    static_configs:
      - targets: ['worker:8080']
    metrics_path: /metrics
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'xrnotify-worker'

  # ============================================
  # Redis Exporter (optional - if using redis_exporter)
  # ============================================
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # ============================================
  # PostgreSQL Exporter (optional - if using postgres_exporter)
  # ============================================
  # - job_name: 'postgresql'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # ============================================
  # Prometheus Self-Monitoring
  # ============================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
