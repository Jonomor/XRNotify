# =============================================================================
# XRNotify Railway Configuration
# =============================================================================
# This file configures the web service. Worker and listener services are
# configured separately in Railway dashboard with different start commands.
# =============================================================================

[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

[build.nixpacksPlan.phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[build.nixpacksPlan.phases.build]
cmds = [
  "pnpm --filter @xrnotify/shared build",
  "pnpm --filter @xrnotify/platform build"
]

[deploy]
startCommand = "node apps/platform/.next/standalone/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# =============================================================================
# Service Configuration Notes for Railway Dashboard
# =============================================================================
#
# Create THREE services in your Railway project, all from the same repo:
#
# SERVICE 1: web (this config)
# - Start command: node apps/platform/.next/standalone/server.js
# - Port: 3000
# - Health check: /api/health
#
# SERVICE 2: worker
# - Start command: node workers/webhook-worker/dist/index.js
# - No port (background worker)
# - Build: pnpm --filter @xrnotify/webhook-worker build
#
# SERVICE 3: listener
# - Start command: node workers/xrpl-listener/dist/index.js
# - No port (background worker)
# - Build: pnpm --filter @xrnotify/xrpl-listener build
#
# DATABASES (add as services):
# - PostgreSQL (Railway managed)
# - Redis (Railway managed)
#
# =============================================================================
